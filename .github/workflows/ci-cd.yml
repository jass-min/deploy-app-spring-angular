name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Make Maven wrapper executable
        run: |
          cd ./springboot/app
          chmod +x mvnw
          
      - name: Build Spring Boot JAR
        run: |
          cd ./springboot/app
          ./mvnw clean package -DskipTests
          
      - name: Build Backend Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-backend:latest ./springboot/app

      - name: Push Backend Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-backend:latest

      - name: Build Frontend Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-frontend:latest ./angular-app

      - name: Push Frontend Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-frontend:latest
          
      - name: Test application with Docker Compose
        run: |
          # Installer docker-compose (si besoin)
          sudo apt-get update
          sudo apt-get install -y docker-compose

          # Lancer les conteneurs
          docker-compose -f docker-compose.yml up -d

          # Vérifier que les conteneurs sont en running
          docker ps

      - name: Check backend health
        run: |
          sleep 10  # attendre que les conteneurs démarrent
          curl -f http://localhost:8081/actuator/health
