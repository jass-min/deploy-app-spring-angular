name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Make Maven wrapper executable
        run: |
          cd ./springboot/app
          chmod +x mvnw
          
      - name: Build Spring Boot JAR
        run: |
          cd ./springboot/app
          ./mvnw clean package -DskipTests
          
      - name: Build Backend Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-backend:latest ./springboot/app

      - name: Push Backend Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-backend:latest

      - name: Build Frontend Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-frontend:latest ./angular-app

      - name: Push Frontend Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-frontend:latest
          
      - name: Start containers with Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose
          docker-compose -f docker-compose.yml up -d

      - name: Wait for backend to be ready
        run: |
         CONTAINER_ID=$(docker ps -qf "name=spring-boot-app")
         for i in {1..20}; do
           if docker exec $CONTAINER_ID curl -f http://localhost:8081/actuator/health; then
             echo "Backend is ready!"
             break
           else
            echo "Waiting for backend..."
            sleep 3
           fi
         done

      - name: Test frontend-backend communication
        run: |
         FRONTEND_ID=$(docker ps -qf "name=angular-app")
         docker exec $FRONTEND_ID curl -f http://spring-boot-app:8081/actuator/health
      
